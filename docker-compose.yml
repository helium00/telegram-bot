services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sagunto_hub_bot}
      POSTGRES_USER: ${POSTGRES_USER:-sagunto_bot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sagunto_bot_user} -d ${POSTGRES_DB:-sagunto_hub_bot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # PostgreSQL is NOT exposed publicly by default.
    # Uncomment the next two lines only for local debugging:
    # ports:
    #   - "5432:5432"

  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
